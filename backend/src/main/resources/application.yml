server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/forum_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: forum_user
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong
    expiration: 86400000

  upload:
    path: ./uploads